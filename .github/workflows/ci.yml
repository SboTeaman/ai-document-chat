name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.6.9 black==24.8.0
      - run: ruff check .
      - run: black --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: knowledgebase_test
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: kb_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql://kb_user:kb_password@localhost:5432/knowledgebase_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      OPENAI_API_KEY: test-key
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET_NAME: test-bucket
      AWS_S3_ENDPOINT_URL: http://localhost:9000
      DEBUG: "False"
      ALLOWED_HOSTS: localhost
      ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get install -y libmagic1
      - run: pip install -r requirements-dev.txt
      - run: python manage.py migrate --noinput
      - run: pytest --cov --cov-report=xml --cov-report=term-missing -q  # fails under 100% (see pyproject)
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build  # `vue-tsc && vite build` — also type-checks

  manifests:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render kustomize
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar xzf kustomize.tar.gz
          ./kustomize build k8s/ > rendered.yaml
      - name: Validate against Kubernetes schemas
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: -strict -ignore-missing-schemas -summary rendered.yaml

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: knowledge-base-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: knowledge-base-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
