[tool.black]
line-length = 120
target-version = ["py312"]
extend-exclude = '''
/(
  migrations
  | staticfiles
  | \.local
)/
'''

[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = ["migrations", "staticfiles", ".local"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "S",    # bandit (security)
    "DJ",   # django-specific
]
ignore = [
    "E501",   # handled by black
    "S101",   # asserts are fine in tests
    "B008",   # function calls in default args are common in DRF
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S105", "S106", "S311"]
"**/settings/*.py" = ["S105"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "common", "config"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--reuse-db -p no:warnings"

[tool.coverage.run]
source = ["apps", "common"]
omit = ["*/migrations/*", "*/tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 100
exclude_also = ["if TYPE_CHECKING:", "raise NotImplementedError", "@(abc\\.)?abstractmethod"]
