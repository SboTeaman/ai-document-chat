server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets, never cache the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback — API/admin/static are routed to the backend by the
    # Ingress, so nginx only ever serves the built single-page app here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
