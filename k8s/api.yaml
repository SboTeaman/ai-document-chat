apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-api
  namespace: knowledge-base
  labels: { app.kubernetes.io/name: kb-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: kb-api }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kb-api }
    spec:
      containers:
        - name: api
          image: knowledge-base-backend:latest
          command:
            ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "120"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: kb-config }
            - secretRef: { name: kb-secrets }
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              # Avoid SECURE_SSL_REDIRECT bouncing the probe to HTTPS.
              httpHeaders:
                - { name: X-Forwarded-Proto, value: https }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - { name: X-Forwarded-Proto, value: https }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: kb-api
  namespace: knowledge-base
spec:
  selector: { app.kubernetes.io/name: kb-api }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
