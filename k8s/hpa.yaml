apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kb-api
  namespace: knowledge-base
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kb-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kb-worker
  namespace: knowledge-base
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kb-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
