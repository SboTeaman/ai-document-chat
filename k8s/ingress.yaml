apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kb-ingress
  namespace: knowledge-base
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"  # match MAX_UPLOAD_SIZE_MB
    # SSE chat stream must not be buffered, or tokens arrive in one burst.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["kb.example.com"]
      secretName: kb-tls
  rules:
    - host: kb.example.com
      http:
        paths:
          # Backend-owned paths.
          - { path: /api, pathType: Prefix, backend: { service: { name: kb-api, port: { number: 8000 } } } }
          - { path: /admin, pathType: Prefix, backend: { service: { name: kb-api, port: { number: 8000 } } } }
          - { path: /static, pathType: Prefix, backend: { service: { name: kb-api, port: { number: 8000 } } } }
          - { path: /health, pathType: Prefix, backend: { service: { name: kb-api, port: { number: 8000 } } } }
          # Everything else is the SPA.
          - { path: /, pathType: Prefix, backend: { service: { name: kb-frontend, port: { number: 80 } } } }
