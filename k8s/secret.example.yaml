# TEMPLATE ONLY — copy to secret.yaml, fill real values, and DO NOT commit it.
# In production prefer a sealed-secrets / external-secrets operator over plain
# manifests. `stringData` lets you paste plaintext; k8s base64-encodes it.
apiVersion: v1
kind: Secret
metadata:
  name: kb-secrets
  namespace: knowledge-base
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "replace-with-50-char-random-string"
  DATABASE_URL: "postgresql://kb_user:CHANGE_ME@postgres:5432/knowledgebase"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  # For real AWS S3 omit AWS_S3_ENDPOINT_URL and use IAM/role credentials.
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
