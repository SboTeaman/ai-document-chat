apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-worker
  namespace: knowledge-base
  labels: { app.kubernetes.io/name: kb-worker }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: kb-worker }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kb-worker }
    spec:
      containers:
        - name: worker
          image: knowledge-base-backend:latest
          command: ["celery", "-A", "config.celery", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef: { name: kb-config }
            - secretRef: { name: kb-secrets }
          livenessProbe:
            exec:
              command: ["sh", "-c", "celery -A config.celery inspect ping -d celery@$HOSTNAME"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-beat
  namespace: knowledge-base
  labels: { app.kubernetes.io/name: kb-beat }
spec:
  # Beat must be a singleton — more than one replica double-schedules tasks.
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: kb-beat }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kb-beat }
    spec:
      containers:
        - name: beat
          image: knowledge-base-backend:latest
          command:
            ["celery", "-A", "config.celery", "beat", "--loglevel=info",
             "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
          envFrom:
            - configMapRef: { name: kb-config }
            - secretRef: { name: kb-secrets }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
